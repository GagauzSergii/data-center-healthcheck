<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/globe-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Global Telemetry & Chaos Engineering Dashboard — visualize and simulate real-time AIOps incidents across a distributed network."
    />
    <title>Global Telemetry · Chaos Dashboard</title>
    <!-- Google Fonts: Inter + JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      // Polyfills for older libraries
      if (typeof window.global === 'undefined') window.global = window;
      if (typeof window.process === 'undefined') window.process = { env: {} };

      // Global error handler to catch initialization errors before React mounts
      window.onerror = function(msg, url, line, col, error) {
        var errDiv = document.createElement('div');
        errDiv.style.cssText = "position:fixed;top:0;left:0;right:0;padding:20px;background:#fee;color:#900;z-index:9999;font-family:monospace;white-space:pre-wrap;";
        errDiv.innerHTML = "<b>Global Error:</b> " + msg + "<br/>" + url + ":" + line + ":" + col + "<br/>" + (error && error.stack ? error.stack : '');
        document.body.appendChild(errDiv);
      };
      window.addEventListener('unhandledrejection', function(event) {
        var errDiv = document.createElement('div');
        errDiv.style.cssText = "position:fixed;top:0;left:0;right:0;padding:20px;background:#fee;color:#900;z-index:9999;font-family:monospace;white-space:pre-wrap;";
        errDiv.innerHTML = "<b>Unhandled Promise Rejection:</b> " + event.reason;
        document.body.appendChild(errDiv);
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
